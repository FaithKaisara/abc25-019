<!DOCTYPE html>
<html lang="en">
<head>
    <title>Triple K - Feedback</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
     <div id="divmaincontainer">
        <header id="siteheader">
            <h1 id="sitetitle">TRIPLE K</h1>
            <span id="sitemotto">Y2K Unisex Clothing | Style For Everyone</span>
        </header>

        <nav id="sitenav">
            <ul id="ulnav">
                <il><a href="index.html">Home</a></il>
                <il><a href="products.html">Products</a></il>
                <il><a href="about.html">About</a></il>
                <il><a href="contact.html">Contact</a></il>
                <il><a href="feedback.html">Feedback</a></il>
            </ul>
        </nav>

        <main id="maincontent">
            <h2 class="section-title">Customer Feedback</h2>

            <section id="feedback-section">
                <div class="feedback-container">
                    <div class="feedback-intro">
                        <p>We value your opinion! Please take a moment to share your experience with our service.</p>
                    </div>

                    <form class="feedback-form" action="#" method="post">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Your Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label>How would you rate us?</label>
                            <div class="rating">
                                <label><input type="radio" name="rating" value="5">⭐⭐⭐⭐⭐ Excellent</label>
                                <label><input type="radio" name="rating" value="4">⭐⭐⭐⭐ Good</label>
                                <label><input type="radio" name="rating" value="3">⭐⭐⭐ Average</label>
                                <label><input type="radio" name="rating" value="2">⭐⭐ Fair</label>
                                <label><input type="radio" name="rating" value="1">⭐ Poor</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="comments">Your Feedback</label>
                            <textarea id="comments" name="comments" rows="5" placeholder="Tell us what you think..." required></textarea>
                        </div>

                        <button type="submit" class="btn">Submit Feedback!</button>
                    </form>
                </div>
            </section>
        </main>

        <footer id="sitefooter">
            <p>&copy;2026 Triple K. All rights reserved.</p>
            <p>Email: info@triplek.com | Instagram: @triple_k</p>
        </footer>
</body>
</html>
